# Config settings for testing accessor-less instance variables

# Colour pairs
colour 1 red black
colour 2 green blue

# Logfile (project-relative path)
logfile ./tmp/test-diakonos.log

# Language filemasks and bangmasks
lang.ruby.filemask \.rb$
lang.python.filemask \.py$
lang.ruby.bangmask ruby
lang.python.bangmask python

# Indent triggers
lang.ruby.indent.triggers ^(end|else|rescue|ensure)\b
lang.python.indent.triggers ^\s*(else|elif|except|finally):

# Fuzzy file find ignore
fuzzy_file_find.ignore \.git
fuzzy_file_find.ignore node_modules
fuzzy_file_find.ignore \.svn

# Sample settings for @setting_strings / @configs coverage
context.separator ---
max_clips 20
view.line_numbers true
