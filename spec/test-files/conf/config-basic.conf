# Basic config settings for parse_configuration_file tests

# String settings
context.separator ---
diff_command diff
clipboard.external xclip
session.default_session my-session

# String settings with quote stripping
status.left " LFT "
status.right " RGT "
status.modified_str "[+]"
status.unnamed_str "[unnamed]"
status.filler .
view.line_numbers.number_format " %3d "
interaction.blink_string ***

# Boolean settings
context.visible true
context.combined false
eof_newline true
suppress_welcome true
convert_tabs false
view.line_numbers true
find.return_on_abort true
fuzzy_file_find true
fuzzy_file_find.recursive false

# Integer settings
context.max_levels 5
context.max_segment_width 40
max_clips 20
max_undo_lines 100
view.margin.x 2
view.margin.y 3
view.scroll_amount 5
view.lookback 10
grep.context 3
view.line_numbers.width 6
fuzzy_file_find.max_files 500
async_update_interval 200

# Integer settings with minimum of 1
view.jump.x 4
view.jump.y 6

# Float settings
context.delay 0.25
interaction.blink_duration 0.5
interaction.choice_delay 1.5
close_forgotten_buffers_after 30.0

# Status vars (array setting)
status.vars type_str filename

# BOL/EOL behaviour
bol_behaviour first-char
eol_behaviour last-char

# Fuzzy file find ignore
fuzzy_file_find.ignore \.git
fuzzy_file_find.ignore node_modules

